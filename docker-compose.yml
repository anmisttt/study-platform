services:
  backend:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "sh /scripts/install-native-deps.sh && cd /shared && npm install && npm run build && cd /app && npm install && npm run start"
    volumes:
      - ./backend:/app
      - ./shared:/shared
      - ./scripts/install-native-deps.sh:/scripts/install-native-deps.sh:ro
    ports:
      - "3001:3001"

  frontend:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "cd /shared && npm install && npm run build && cd /app && npm install && npm run dev -- --host 0.0.0.0 --port 5173"
    volumes:
      - ./frontend:/app
      - ./shared:/shared
    ports:
      - "5173:5173"
    depends_on:
      - backend
